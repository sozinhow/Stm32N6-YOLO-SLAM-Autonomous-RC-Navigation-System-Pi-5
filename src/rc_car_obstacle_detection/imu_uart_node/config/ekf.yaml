ekf_node:  # <--- THIS MUST MATCH THE 'name' IN YOUR LAUNCH FILE
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    
    # Use 'imu0', 'imu1', etc. 
    imu0: /imu/data
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  true,  true,  true]

    # WARNING: EKF does not subscribe to "/scan" (LaserScan) directly!
    # It subscribes to Odometry, Pose, or Twist. 
    # If your Lidar node outputs /odom, use:
    odom0: /odom 
    odom0_config: [true,  true,  false,
                   false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false]